<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0a14;--surface:#161122;--surface2:#0d0a14;--border:#2a2040;--text:#e8e0f0;--text2:#c8bdd8;--text3:#9a8fb0;--text4:#6e6380;--text5:#4a4060;--accent:#e879a8;--accent2:#c084fc;--warm:#fbbf24;--mint:#34d399;--link:#a78bfa;--green:#00ff88;--font:'Outfit',sans-serif;--mono:'JetBrains Mono','Fira Code',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 15px rgba(232,121,168,.12)}50%{box-shadow:0 0 30px rgba(232,121,168,.25)}}
.header{background:linear-gradient(180deg,#1a1028,var(--bg));border-bottom:1px solid var(--border);padding:24px 20px 18px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-inner{max-width:860px;margin:0 auto}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
.header-tag{font-family:var(--mono);color:var(--accent);font-size:10px;letter-spacing:3px;font-weight:600;margin-bottom:3px}
.header h1{font-size:20px;font-weight:800;color:#f8f0ff;letter-spacing:-.5px}
.header-sub{color:var(--text5);font-size:12px;margin-top:2px;font-family:var(--mono)}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn-s{background:transparent;border:1px solid #443860;color:var(--text3);padding:5px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:var(--mono);transition:background .15s}
.btn-s:hover{background:var(--border)}
.btn-reset{background:transparent;border:1px solid #ef444433;color:#ef4444;padding:5px 10px;border-radius:5px;font-size:10px;cursor:pointer;font-family:var(--mono)}
.btn-reset:hover{background:#ef444411}
.prog-wrap{margin-top:14px}
.prog-labels{display:flex;justify-content:space-between;margin-bottom:5px;font-family:var(--mono);font-size:11px}
.prog-left{color:var(--text5)}
.prog-right{color:var(--accent);font-weight:600}
.prog-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s ease}
.prog-fill.glowing{animation:glow 3s infinite}
.stats-panel{max-width:860px;margin:0 auto;padding:14px 20px 0;animation:slideIn .25s ease}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color .2s}
.stat-card:hover{border-color:#443860}
.stat-phase{font-size:9px;font-family:var(--mono);font-weight:600;letter-spacing:1px}
.stat-pct{font-size:22px;font-weight:800;color:#f8f0ff;margin:2px 0}
.stat-count{font-size:10px;color:var(--text5);font-family:var(--mono)}
.stat-bar{height:2px;background:var(--border);border-radius:1px;margin-top:6px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:1px;transition:width .4s}
.tabs{max-width:860px;margin:0 auto;padding:14px 20px 0;display:flex;gap:4px;overflow-x:auto}
.tab{background:transparent;border:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--text4);padding:7px 12px;border-radius:7px 7px 0 0;font-size:11px;font-weight:400;cursor:pointer;font-family:var(--mono);white-space:nowrap;transition:all .15s}
.tab:hover{background:var(--border)}
.tab.active{background:var(--surface);font-weight:700}
.tab .tpct{margin-left:5px;opacity:.5;font-size:9px}
.content{max-width:860px;margin:0 auto;padding:0 20px 40px}
.phase-banner{background:var(--surface);border-radius:0 8px 8px 8px;padding:16px 20px;margin-bottom:12px}
.phase-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.phase-title{font-size:16px;font-weight:800;letter-spacing:.5px}
.phase-sub{color:var(--text4);font-size:12px;margin-top:1px}
.phase-badge{padding:4px 12px;border-radius:16px;font-family:var(--mono);font-size:11px;font-weight:600}
.module{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .3s}
.mod-header{width:100%;background:transparent;border:none;color:var(--text);padding:14px 16px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;transition:background .15s;font-family:var(--font)}
.mod-header:hover{background:var(--border)}
.mod-icon{font-size:22px;flex-shrink:0}
.mod-info{flex:1;min-width:0}
.mod-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.mod-name{font-weight:700;font-size:14px}
.mod-weeks{color:var(--text5);font-size:11px;font-family:var(--mono);margin-left:8px}
.mod-prog{font-family:var(--mono);font-size:11px;font-weight:600}
.mod-arrow{transition:transform .2s;color:var(--text5);font-size:10px;margin-left:8px}
.mod-arrow.open{transform:rotate(180deg)}
.mod-bar{height:2px;background:var(--surface2);border-radius:1px;margin-top:8px;overflow:hidden}
.mod-bar-fill{height:100%;border-radius:1px;transition:width .4s}
.mod-body{padding:0 16px 16px;animation:slideIn .2s ease}
.mark-row{display:flex;justify-content:flex-end;margin-bottom:8px}
.btn-mark{background:transparent;padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer;font-family:var(--mono);transition:background .15s}
.btn-mark:hover{background:var(--surface2)}
.sec-box{background:var(--surface2);border-radius:6px;padding:10px 14px;margin-bottom:10px}
.sec-label{font-size:10px;font-family:var(--mono);font-weight:600;margin-bottom:8px;letter-spacing:1.5px}
.topic-row{display:flex;align-items:flex-start;gap:9px;padding:7px 4px;border-radius:4px;cursor:pointer;transition:all .15s;user-select:none}
.topic-row:hover{background:var(--surface)}
.topic-row.done{opacity:.5}
.chk{min-width:18px;height:18px;border-radius:3px;border:1.5px solid #443860;display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0;transition:all .15s}
.chk.on{border-color:var(--green);background:rgba(0,255,136,.1)}
.t-text{font-size:12.5px;line-height:1.5}
.t-text.done{text-decoration:line-through;color:var(--text5)}
.res-box{border-left:2px solid rgba(192,132,252,.2)}
.res-link{display:block;margin-bottom:5px}
.res-link a{color:var(--link);text-decoration:none;font-size:12px;transition:color .15s}
.res-link a:hover{color:#c4b5fd}
.res-arrow{color:var(--text5);margin-right:6px}
.proj-box{border-left:2px solid rgba(52,211,153,.2)}
.footer{text-align:center;padding:28px 0 8px;margin-top:24px}
.footer-text{font-family:var(--mono);font-size:10px;color:var(--border)}
@media(max-width:600px){.header h1{font-size:17px}.stats-grid{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}.mod-weeks{display:none}}
</style>
</head>

let completed={};
let activePhase="p1";
let expandedModule=null;
let showStats=false;

const allIds=[];
PHASES.forEach(function(p){p.modules.forEach(function(m){m.topics.forEach(function(t){allIds.push(t.id);});});});
const TOTAL=allIds.length;

function load(){try{var r=localStorage.getItem(SK);if(r)completed=JSON.parse(r);}catch(e){completed={};}}
function save(){try{localStorage.setItem(SK,JSON.stringify(completed));}catch(e){}}
function toggle(id){if(completed[id])delete completed[id];else completed[id]=Date.now();save();render();}
function toggleAll(modId){
  var phase=null,mod=null;
  for(var i=0;i<PHASES.length;i++){for(var j=0;j<PHASES[i].modules.length;j++){if(PHASES[i].modules[j].id===modId){phase=PHASES[i];mod=PHASES[i].modules[j];break;}}if(mod)break;}
  if(!mod)return;
  var allDone=mod.topics.every(function(t){return completed[t.id];});
  mod.topics.forEach(function(t){if(allDone)delete completed[t.id];else if(!completed[t.id])completed[t.id]=Date.now();});
  save();render();
}
function resetAll(){if(!confirm("Borrar TODO tu progreso? No se puede deshacer."))return;completed={};try{localStorage.removeItem(SK);}catch(e){}render();}
function modProg(m){var d=m.topics.filter(function(t){return completed[t.id];}).length;return{done:d,total:m.topics.length,pct:Math.round((d/m.topics.length)*100)};}
function phaseProg(p){var d=0,t=0;p.modules.forEach(function(m){m.topics.forEach(function(tp){t++;if(completed[tp.id])d++;});});return{done:d,total:t,pct:t?Math.round((d/t)*100):0};}
function totalProg(){var d=Object.keys(completed).length;return{done:d,total:TOTAL,pct:Math.round((d/TOTAL)*100)};}
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}

function render(){
  var tot=totalProg();
  var phase=null;
  for(var i=0;i<PHASES.length;i++){if(PHASES[i].id===activePhase){phase=PHASES[i];break;}}
  var h="";

  h+='<div class="header"><div class="header-inner">';
  h+='<div class="header-top"><div>';
  h+='<div class="header-tag">CAREER://CONTENT & COMMUNITY</div>';
  h+='<h1>Content Strategist & Community Builder</h1>';
  h+='<div class="header-sub">18 meses \u00b7 Abr 2026 \u2192 Sep 2027 \u00b7 '+TOTAL+' temas \u00b7 72 semanas</div>';
  h+='</div><div class="header-actions">';
  h+='<button class="btn-s" onclick="showStats=!showStats;render();">'+(showStats?"\u2715":"\ud83d\udcca")+'</button>';
  h+='<button class="btn-reset" onclick="resetAll()">reset</button>';
  h+='</div></div>';
  h+='<div class="prog-wrap"><div class="prog-labels"><span class="prog-left">progreso total</span>';
  h+='<span class="prog-right">'+tot.done+'/'+tot.total+' \u00b7 '+tot.pct+'%</span></div>';
  h+='<div class="prog-track"><div class="prog-fill '+(tot.pct>0&&tot.pct<100?"glowing":"")+'" style="width:'+tot.pct+'%"></div></div>';
  h+='</div></div></div>';

  if(showStats){
    h+='<div class="stats-panel"><div class="stats-grid">';
    PHASES.forEach(function(p){
      var pr=phaseProg(p);
      h+='<div class="stat-card" style="'+(pr.pct===100?"border-color:"+p.color+"55":"")+'" onclick="activePhase=\''+p.id+'\';showStats=false;expandedModule=null;render();">';
      h+='<div class="stat-phase" style="color:'+p.color+'">FASE '+p.phase+'</div>';
      h+='<div class="stat-pct">'+pr.pct+'%</div>';
      h+='<div class="stat-count">'+pr.done+'/'+pr.total+'</div>';
      h+='<div class="stat-bar"><div class="stat-bar-fill" style="width:'+pr.pct+'%;background:'+p.color+'"></div></div>';
      h+='</div>';
    });
    h+='</div></div>';
  }

  h+='<div class="tabs">';
  PHASES.forEach(function(p){
    var pr=phaseProg(p);
    var act=p.id===activePhase;
    h+='<button class="tab '+(act?"active":"")+'" style="'+(act?"color:"+p.color+";border-bottom-color:"+p.color+";border-color:"+p.color+"44":"")+'" onclick="activePhase=\''+p.id+'\';expandedModule=null;render();">';
    h+=(pr.pct===100?"\u2713 ":"")+"T"+p.phase+'<span class="tpct">'+pr.pct+'%</span></button>';
  });
  h+='</div>';

  h+='<div class="content">';
  if(phase){
    var pp=phaseProg(phase);
    h+='<div class="phase-banner" style="border:1px solid '+phase.color+'18"><div class="phase-top"><div>';
    h+='<div class="phase-title" style="color:'+phase.color+'">TRIMESTRE '+phase.phase+': '+esc(phase.title)+'</div>';
    h+='<div class="phase-sub">'+esc(phase.months)+' \u00b7 '+phase.modules.length+' m\u00f3dulos</div>';
    h+='</div><div class="phase-badge" style="background:'+phase.color+'12;border:1px solid '+phase.color+'28;color:'+phase.color+'">'+pp.done+'/'+pp.total+'</div></div></div>';

    phase.modules.forEach(function(mod){
      var mp=modProg(mod);
      var isExp=expandedModule===mod.id;
      h+='<div class="module" style="'+(mp.pct===100?"border-color:"+phase.color+"33":"")+'">';
      h+='<button class="mod-header" onclick="expandedModule=expandedModule===\''+mod.id+'\'?null:\''+mod.id+'\';render();">';
      h+='<span class="mod-icon" style="filter:'+(mp.pct===100?"grayscale(0)":"grayscale(.3)")+'">'+mod.icon+'</span>';
      h+='<div class="mod-info"><div class="mod-top"><div><span class="mod-name">'+esc(mod.title)+'</span><span class="mod-weeks">'+esc(mod.weeks)+'</span></div>';
      h+='<div style="display:flex;align-items:center"><span class="mod-prog" style="color:'+(mp.pct===100?"var(--green)":phase.color)+'">'+(mp.pct===100?"\u2713 ":"")+mp.done+'/'+mp.total+'</span>';
      h+='<span class="mod-arrow '+(isExp?"open":"")+'">▼</span></div></div>';
      h+='<div class="mod-bar"><div class="mod-bar-fill" style="width:'+mp.pct+'%;background:'+(mp.pct===100?"var(--green)":phase.color)+'"></div></div>';
      h+='</div></button>';

      if(isExp){
        h+='<div class="mod-body">';
        h+='<div class="mark-row"><button class="btn-mark" style="border:1px solid '+phase.color+'33;color:'+phase.color+'" onclick="event.stopPropagation();toggleAll(\''+mod.id+'\')">'+(mp.pct===100?"desmarcar todo":"marcar todo \u2713")+'</button></div>';

        h+='<div class="sec-box"><div class="sec-label" style="color:'+phase.color+'">TEMAS</div>';
        mod.topics.forEach(function(t){
          var dn=!!completed[t.id];
          h+='<div class="topic-row '+(dn?"done":"")+'" onclick="toggle(\''+t.id+'\')">';
          h+='<div class="chk '+(dn?"on":"")+'">'+(dn?'<span style="color:var(--green);font-size:11px;font-weight:800">\u2713</span>':"")+'</div>';
          h+='<span class="t-text '+(dn?"done":"")+'">'+esc(t.text)+'</span></div>';
        });
        h+='</div>';

        h+='<div class="sec-box res-box"><div class="sec-label" style="color:var(--warm)">RECURSOS GRATIS</div>';
        mod.resources.forEach(function(r){
          h+='<div class="res-link"><a href="'+esc(r.url)+'" target="_blank" rel="noopener"><span class="res-arrow">\u2192</span>'+esc(r.name)+'</a></div>';
        });
        h+='</div>';

        h+='<div class="sec-box proj-box"><div class="sec-label" style="color:var(--mint)">PROYECTO PR\u00c1CTICO</div>';
        h+='<p style="font-size:12.5px;line-height:1.55;color:var(--text3)">'+esc(mod.project)+'</p></div>';
        h+='</div>';
      }
      h+='</div>';
    });
  }

  h+='<div class="footer"><div class="footer-text">built for carla \u00b7 progreso guardado en este navegador</div></div>';
  h+='</div>';

  document.getElementById("app").innerHTML=h;
}

load();
render();
</script>
